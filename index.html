<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Myntra Recommendation Page</title>

<style>

/* PAGE STYLE */

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f6;
}

/* NAVBAR */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
font-size:28px;
font-weight:bold;
color:#ff3f6c;
}

.nav-links a{
margin:0 10px;
text-decoration:none;
color:#333;
font-weight:600;
}

.search-box{
padding:8px 12px;
width:250px;
border-radius:5px;
border:1px solid #ccc;
}

/* SECTION */

.section{
padding:40px;
}

.section h2{
margin-bottom:25px;
font-size:20px;
}

/* PRODUCT GRID */

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

/* PRODUCT CARD */

.product-card{
background:white;
padding:15px;
border-radius:8px;
transition:0.3s;
cursor:pointer;
}

.product-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.product-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:5px;
}

.rating{
display:inline-block;
background:#e8f5e9;
padding:3px 8px;
border-radius:4px;
font-size:12px;
margin-top:6px;
}

.brand{
font-weight:bold;
margin-top:8px;
}

.name{
font-size:14px;
color:#555;
}

.price{
margin-top:8px;
}

.current{
font-weight:bold;
margin-right:6px;
}

.old{
text-decoration:line-through;
color:#888;
margin-right:6px;
}

.discount{
color:#ff3f6c;
font-weight:600;
}

</style>
</head>


<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">M</div>

<div class="nav-links">
<a href="#">MEN</a>
<a href="#">WOMEN</a>
<a href="#">KIDS</a>
<a href="#">HOME</a>
<a href="#">BEAUTY</a>
<a href="#">GENZ</a>
</div>

<input class="search-box" type="text" placeholder="Search for products, brands and more">

</div>


<!-- RECOMMENDATION SECTION -->

<div class="section">

<h2>SIMILAR PRODUCTS</h2>

<div class="product-grid" id="productGrid"></div>

</div>


<script>

/* PRODUCT DATA (SIMULATED RECOMMENDATION SYSTEM) */

const products = [

{
brand:"Fastrack",
name:"Vyb Slayer Analogue Watch",
price:1697,
oldPrice:2425,
rating:4.4,
https://www.myntra.com/watches/fastrack/fastrack-vyb-runway-quartz-mint-greendial-analog-watch-for-women---fv60031sm02w/38077415/buy
},

{
brand:"Fastrack",
name:"Bracelet Style Analogue Watch",
price:9795,
oldPrice:null,
rating:4.5,
https://www.myntra.com/watches/fastrack/fastrack-vyb-siren-women-leather-straps-analogue-watch-fv60029wl02w/28138040/buy
},

{
brand:"Fastrack",
name:"Women Eclipse Analogue Watch",
price:1893,
oldPrice:2705,
rating:4.7,
https://www.myntra.com/watches/fastrack/fastrack-women-vyb-enigma-dial--bracelet-style-straps-analogue-watch-fv60050wm01w/30707776/buy
},

{
brand:"Fastrack",
name:"Women Vyb Diva Analogue Watch",
price:1848,
oldPrice:2640,
rating:4.5,
https://www.myntra.com/watches/fastrack/fastrack-girls-vyb-eclipse-quartz-analog-light-grey-dial-watch---fv60123wm01w/39663968/buy
},

{
brand:"Fastrack",
name:"Women Watch",
price:1792,
oldPrice:2560,
rating:4.7,
https://www.myntra.com/watches/fastrack/fastrack-vyb-slayer-women-printed-dial--bracelet-style-analogue-watch-fv60033km03w/28138094/buy
}

];


/* DISPLAY PRODUCTS */

const grid = document.getElementById("productGrid");

products.forEach(product => {

let discount = "";

if(product.oldPrice){
let percent = Math.round((product.oldPrice-product.price)/product.oldPrice*100);
discount = `<span class="discount">(${percent}% OFF)</span>`;
}

grid.innerHTML += `

<div class="product-card">

<img src="${product.image}">

<div class="rating">⭐ ${product.rating}</div>

<div class="brand">${product.brand}</div>

<div class="name">${product.name}</div>

<div class="price">
<span class="current">Rs. ${product.price}</span>
<span class="old">${product.oldPrice ? "Rs."+product.oldPrice : ""}</span>
${discount}
</div>

</div>

`;

});

</script>

</body>
</html>
